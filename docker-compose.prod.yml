services:
  postgres:
    image: postgres:16-alpine
    container_name: weatheraggregator-db
    environment:
      POSTGRES_DB: weatheraggregator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: weatheraggregator-redis
    command: redis-server --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  backend:
    image: ghcr.io/gulati8/weatheraggregator-api:latest
    container_name: weatheraggregator-api
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/weatheraggregator
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      OWM_API_KEY: ${OWM_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - proxy
      - internal

  frontend:
    image: ghcr.io/gulati8/weatheraggregator-web:latest
    container_name: weatheraggregator-web
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - proxy

volumes:
  pgdata:

networks:
  proxy:
    external: true
  internal:
    driver: bridge
