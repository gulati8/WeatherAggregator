name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize, closed]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: read
      packages: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/weatheraggregator-api:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/weatheraggregator-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/weatheraggregator-web:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/weatheraggregator-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Determine deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            echo "app_name=weatheraggregator-pr-${PR_NUM}" >> "$GITHUB_OUTPUT"
            echo "image_tag=pr-${PR_NUM}" >> "$GITHUB_OUTPUT"
            echo "is_pr=true" >> "$GITHUB_OUTPUT"
            echo "uat_url=https://weatheraggregator-pr-${PR_NUM}.gulatilabs.me" >> "$GITHUB_OUTPUT"
          else
            echo "app_name=weatheraggregator" >> "$GITHUB_OUTPUT"
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
            echo "is_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy production to EC2
        if: steps.target.outputs.is_pr == 'false'
        run: |
          # Encode docker-compose file to base64 to avoid shell escaping issues
          COMPOSE_CONTENT=$(base64 -w 0 docker-compose.prod.yml)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"test -f /srv/weatheraggregator/.env || (echo 'ERROR: .env not found' && exit 1)\",
              \"echo '$COMPOSE_CONTENT' | base64 -d > /srv/weatheraggregator/docker-compose.prod.yml\",
              \"cd /srv/weatheraggregator\",
              \"echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin\",
              \"docker compose -f docker-compose.prod.yml pull\",
              \"docker compose -f docker-compose.prod.yml up -d\",
              \"docker image prune -f\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment successful!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deployment failed!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi
            echo "Waiting for deployment... ($STATUS)"
            sleep 10
          done
          echo "Deployment timed out"
          exit 1

      - name: Deploy PR environment to EC2
        if: steps.target.outputs.is_pr == 'true'
        run: |
          APP_NAME="${{ steps.target.outputs.app_name }}"
          IMAGE_TAG="${{ steps.target.outputs.image_tag }}"

          # Generate a PR-specific docker-compose that reuses prod postgres/redis
          # but runs its own backend + frontend with PR-tagged images
          COMPOSE=$(cat <<'COMPOSEOF'
          services:
            backend:
              image: ghcr.io/gulati8/weatheraggregator-api:IMAGE_TAG_PLACEHOLDER
              container_name: APP_NAME_PLACEHOLDER-api
              environment:
                NODE_ENV: production
                PORT: 3002
                DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@weatheraggregator-db:5432/weatheraggregator
                REDIS_URL: redis://weatheraggregator-redis:6379
                JWT_SECRET: ${JWT_SECRET}
                OWM_API_KEY: ${OWM_API_KEY:-}
              restart: unless-stopped
              networks:
                - proxy
                - weatheraggregator_internal

            frontend:
              image: ghcr.io/gulati8/weatheraggregator-web:IMAGE_TAG_PLACEHOLDER
              container_name: APP_NAME_PLACEHOLDER-web
              depends_on:
                - backend
              restart: unless-stopped
              networks:
                - proxy

          networks:
            proxy:
              external: true
            weatheraggregator_internal:
              external: true
          COMPOSEOF
          )

          # Replace placeholders
          COMPOSE=$(echo "$COMPOSE" | sed "s/IMAGE_TAG_PLACEHOLDER/${IMAGE_TAG}/g" | sed "s/APP_NAME_PLACEHOLDER/${APP_NAME}/g")
          COMPOSE_B64=$(echo "$COMPOSE" | base64 -w 0)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"mkdir -p /srv/${APP_NAME}\",
              \"cp /srv/weatheraggregator/.env /srv/${APP_NAME}/.env 2>/dev/null || true\",
              \"echo '${COMPOSE_B64}' | base64 -d > /srv/${APP_NAME}/docker-compose.yml\",
              \"echo '${APP_NAME}' | docker login ghcr.io -u gulati8 --password-stdin < /dev/null || echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u gulati8 --password-stdin\",
              \"cd /srv/${APP_NAME} && docker compose pull && docker compose up -d --remove-orphans\",
              \"grep -q '${APP_NAME}.gulatilabs.me' /srv/proxy/Caddyfile 2>/dev/null || printf '\\\\n${APP_NAME}.gulatilabs.me {\\\\n  reverse_proxy ${APP_NAME}-web:80\\\\n}\\\\n' >> /srv/proxy/Caddyfile\",
              \"docker exec proxy-caddy-1 caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || docker exec caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "PR environment deployed!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "PR deploy failed!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi
            echo "Waiting for PR deployment... ($STATUS)"
            sleep 10
          done
          echo "PR deployment timed out"
          exit 1

      - name: Notify Slack of UAT deployment
        if: steps.target.outputs.is_pr == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} \
            --json body -q .body \
            --repo "${{ github.repository }}")

          CHANNEL=$(echo "$PR_BODY" | sed -n 's/.*commanddeck:slack_channel=\([^ <]*\).*/\1/p')
          THREAD=$(echo "$PR_BODY" | sed -n 's/.*commanddeck:slack_thread_ts=\([^ <]*\).*/\1/p')

          if [ -n "$CHANNEL" ] && [ -n "$THREAD" ]; then
            UAT_URL="${{ steps.target.outputs.uat_url }}"
            PR_URL="https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"

            curl -s -X POST https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-type: application/json" \
              -d "{
                \"channel\": \"${CHANNEL}\",
                \"thread_ts\": \"${THREAD}\",
                \"text\": \"🚀 UAT deployed and ready for review:\\n${UAT_URL}\\n\\nPR: ${PR_URL}\"
              }"
          else
            echo "No Slack metadata found in PR body — skipping notification"
          fi

  cleanup-pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Remove PR environment
        run: |
          APP_NAME="weatheraggregator-pr-${{ github.event.pull_request.number }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"cd /srv/${APP_NAME} && docker compose down --remove-orphans 2>/dev/null || true\",
              \"rm -rf /srv/${APP_NAME}\",
              \"sed -i '/${APP_NAME}\\.gulatilabs\\.me/,/}/d' /srv/proxy/Caddyfile 2>/dev/null || true\",
              \"docker exec proxy-caddy-1 caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || docker exec caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          for i in {1..15}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "PR environment cleaned up!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Cleanup failed (non-critical)"
              exit 0
            fi
            echo "Waiting for cleanup... ($STATUS)"
            sleep 5
          done

      - name: Notify Slack of cleanup
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} \
            --json body -q .body \
            --repo "${{ github.repository }}" 2>/dev/null || true)

          CHANNEL=$(echo "$PR_BODY" | sed -n 's/.*commanddeck:slack_channel=\([^ <]*\).*/\1/p')
          THREAD=$(echo "$PR_BODY" | sed -n 's/.*commanddeck:slack_thread_ts=\([^ <]*\).*/\1/p')

          MERGED="${{ github.event.pull_request.merged }}"
          if [ "$MERGED" = "true" ]; then
            MSG="✅ PR merged and deployed to production. UAT environment cleaned up."
          else
            MSG="🗑️ PR closed. UAT environment cleaned up."
          fi

          if [ -n "$CHANNEL" ] && [ -n "$THREAD" ]; then
            curl -s -X POST https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-type: application/json" \
              -d "{
                \"channel\": \"${CHANNEL}\",
                \"thread_ts\": \"${THREAD}\",
                \"text\": \"${MSG}\"
              }"
          fi
